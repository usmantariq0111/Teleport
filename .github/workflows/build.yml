name: Build macOS App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Build Rust Daemon
      run: |
        cd daemon
        cargo build --release

    - name: Build Swift UI
      run: |
        cd ui
        swift build -c release

    - name: Package Teleport.app
      run: |
        mkdir -p Teleport.app/Contents/MacOS
        mkdir -p Teleport.app/Contents/Resources
        
        # Copy Swift Executable
        cp ui/.build/release/TeleportUI Teleport.app/Contents/MacOS/
        
        # Copy Rust Daemon into Resources
        cp daemon/target/release/teleport-daemon Teleport.app/Contents/Resources/
        
        # Create Info.plist (LSUIElement=true hides the dock icon for Menu Bar apps)
        cat <<EOF > Teleport.app/Contents/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>TeleportUI</string>
            <key>CFBundleIdentifier</key>
            <string>com.usmantariq.teleport</string>
            <key>CFBundleName</key>
            <string>Teleport</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>LSUIElement</key>
            <true/>
        </dict>
        </plist>
        EOF
        
        # Compress
        zip -r Teleport-macOS.zip Teleport.app

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Teleport-macOS
        path: Teleport-macOS.zip
